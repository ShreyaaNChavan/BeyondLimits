<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Vision Assistant</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #f4f4f9;
            /* Light gray background */
            color: #333;
            /* Dark text for readability */
            font-family: "Poppins", sans-serif;
            text-align: center;
            padding-top: 50px;
        }

        /* Title */
        h1 {
            font-size: 2.2rem;
            text-transform: uppercase;
            font-weight: 600;
            color: #222;
            text-shadow: none;
            /* Removed neon glow */
        }

        /* Video Feed */
        #videoFeed {
            width: 80%;
            height: auto;
            border-radius: 12px;
            border: 2px solid #ccc;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }

        #videoFeed:hover {
            border-color: #007bff;
            box-shadow: 0 6px 12px rgba(0, 123, 255, 0.2);
        }

        /* Status Text */
        #status {
            font-size: 1.1rem;
            margin-top: 20px;
            color: #555;
        }

        /* Buttons */
        .btn {
            font-size: 1rem;
            font-weight: 500;
            padding: 10px 18px;
            border-radius: 6px;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.3s ease;
            outline: none;
        }

        /* Primary Button */
        .btn-primary {
            background-color: #007bff;
            color: white;
            border-color: #007bff;
        }

        .btn-primary:hover {
            background-color: #0056b3;
            border-color: #0056b3;
        }

        /* Danger Button */
        .btn-danger {
            background-color: #dc3545;
            color: white;
            border-color: #dc3545;
        }

        .btn-danger:hover {
            background-color: #b02a37;
            border-color: #b02a37;
        }

        /* Button Container */
        .button-group {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            #videoFeed {
                width: 100%;
            }

            .btn {
                font-size: 0.9rem;
                padding: 8px 14px;
            }
        }
    </style>
</head>

<body>

    <h1>AI Vision Assistant</h1>

    <div class="container">
        <video id="videoFeed" autoplay></video>
        <p id="status">Say: "What book am I holding?" or "What fruit am I eating?"</p>

        <div class="button-group">
            <button id="startAssistant" class="btn btn-primary">Start Assistant</button>
            <button id="stopAssistant" class="btn btn-danger">Stop Assistant</button>
        </div>
    </div>

    <script src="/frontend/js/Eyescript.js"></script>

</body>

</html>
